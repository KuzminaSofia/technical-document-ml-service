services:
  app:
    build:
      context: ./app
    container_name: technical-document-app
    env_file:
      - ./app/.env
    environment:
      APP_STORAGE_DIR: /app/storage/uploads
    volumes:
      - ./app/src:/app/src
      - ./app/tests:/app/tests
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-1:
    build:
      context: ./worker
    container_name: technical-document-worker-1
    env_file:
      - ./app/.env
    environment:
      APP_STORAGE_DIR: /app/storage/uploads
      WORKER_ID: worker-1
    restart: on-failure
    volumes:
      - ./app/src:/app/src:ro
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-2:
    build:
      context: ./worker
    container_name: technical-document-worker-2
    env_file:
      - ./app/.env
    environment:
      APP_STORAGE_DIR: /app/storage/uploads
      WORKER_ID: worker-2
    restart: on-failure
    volumes:
      - ./app/src:/app/src:ro
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web-proxy:
    build:
      context: ./web-proxy
    container_name: technical-document-web-proxy
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: technical-document-rabbitmq
    restart: on-failure
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./storage/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  database:
    image: postgres:16
    container_name: technical-document-database
    environment:
      POSTGRES_DB: technical_document_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d technical_document_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data: