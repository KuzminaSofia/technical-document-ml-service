services:
  migrate:
    build:
      context: ./app
      target: migrate
    container_name: technical-document-migrate
    env_file:
      - ./app/.env
    restart: "no"
    depends_on:
      database:
        condition: service_healthy

  app:
    build:
      context: ./app
      target: development
    container_name: technical-document-app
    env_file:
      - ./app/.env
    environment:
      APP_UPLOADS_DIR: /app/storage/uploads
      APP_ARTIFACTS_DIR: /app/storage/artifacts
    volumes:
      - ./app/src:/app/src
      - ./app/tests:/app/tests
      - ./app/alembic:/app/alembic
      - ./app/alembic.ini:/app/alembic.ini
      - ./storage/uploads:/app/storage/uploads
      - ./storage/artifacts:/app/storage/artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  worker-1:
    build:
      context: ./worker
    container_name: technical-document-worker-1
    env_file:
      - ./app/.env
    environment:
      APP_UPLOADS_DIR: /app/storage/uploads
      APP_ARTIFACTS_DIR: /app/storage/artifacts
      WORKER_ID: worker-1
    restart: on-failure
    volumes:
      - ./app/src:/app/src:ro
      - ./storage/uploads:/app/storage/uploads
      - ./storage/artifacts:/app/storage/artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  worker-2:
    build:
      context: ./worker
    container_name: technical-document-worker-2
    env_file:
      - ./app/.env
    environment:
      APP_UPLOADS_DIR: /app/storage/uploads
      APP_ARTIFACTS_DIR: /app/storage/artifacts
      WORKER_ID: worker-2
    restart: on-failure
    volumes:
      - ./app/src:/app/src:ro
      - ./storage/uploads:/app/storage/uploads
      - ./storage/artifacts:/app/storage/artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: technical-document-frontend
    env_file:
      - ./frontend/.env
    depends_on:
      - app

  web-proxy:
    build:
      context: ./web-proxy
    container_name: technical-document-web-proxy
    depends_on:
      - app
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - tls_certs:/etc/nginx/certs

  rabbitmq:
    image: rabbitmq:3-management
    container_name: technical-document-rabbitmq
    restart: on-failure
    expose:
      - "5672"
    ports:
      - "127.0.0.1:15672:15672"
    volumes:
      - ./storage/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  database:
    image: postgres:16
    container_name: technical-document-database
    environment:
      POSTGRES_DB: technical_document_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d technical_document_service"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  tls_certs: