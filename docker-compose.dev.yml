# Dev override: hot-reload для frontend
# Запуск: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Изменения в .tsx/.ts файлах применяются мгновенно (HMR).
# node_modules хранится в именованном volume — не конфликтует с хост-машиной.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
