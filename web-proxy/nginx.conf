events {}

http {
    # принимаем тело до 210 МБ (max_task_total_size_mb=200 + запас)
    client_max_body_size 210m;

    # Rate limiting: не более 10 запросов в минуту на /api/auth/login
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    upstream app_backend {
        server app:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # защита от brute-force на эндпоинте логина
        location = /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            limit_req_status 429;

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # REST API: /api/... → FastAPI (стрипаем /api перед передачей)
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js фронтенд
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # поддержка HMR WebSocket для Next.js dev-режима
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
