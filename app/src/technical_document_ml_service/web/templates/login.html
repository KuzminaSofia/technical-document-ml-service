{% extends "base.html" %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Вход</h1>
        <p class="muted">
            Войдите в личный кабинет, чтобы просматривать баланс и запускать ML-задачи.
        </p>

        {% if error_message %}
            <div class="alert alert-error">{{ error_message }}</div>
        {% endif %}

        <form method="post" action="{{ request.url_for('login_action') }}" class="form-stack">
            <label class="form-label">
                <span>Email</span>
                <input
                    type="email"
                    name="email"
                    value="{{ form_data.email }}"
                    placeholder="you@example.com"
                    required
                >
            </label>

            <label class="form-label">
                <span>Пароль</span>
                <input
                    type="password"
                    name="password"
                    placeholder="Введите пароль"
                    required
                >
            </label>

            <button type="submit" class="button button-primary button-full">
                Войти
            </button>
        </form>

        <p class="auth-footer">
            Нет аккаунта?
            <a href="{{ request.url_for('register_page') }}">Создать аккаунт</a>
        </p>
    </div>
</section>
{% endblock %}
