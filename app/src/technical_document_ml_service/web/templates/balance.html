{% extends "base.html" %}

{% block content %}
<section class="page-section">
    <div class="page-header-block">
        <div>
            <p class="eyebrow">Баланс</p>
            <h1>Управление балансом</h1>
        </div>
    </div>

    <div class="two-column-grid">
        <article class="card">
            <h2>Текущий баланс</h2>
            <div class="balance-panel">
                <strong class="balance-panel-value">{{ current_user.balance_credits }}</strong>
                <span class="muted">кредитов</span>
            </div>
        </article>

        <article class="card">
            <h2>Пополнить баланс</h2>

            {% if success_message %}
                <div class="alert alert-success">{{ success_message }}</div>
            {% endif %}

            {% if error_message %}
                <div class="alert alert-error">{{ error_message }}</div>
            {% endif %}

            <form method="post" action="{{ request.url_for('top_up_action') }}" class="form-stack">
                <label class="form-label">
                    <span>Сумма пополнения</span>
                    <input
                        type="number"
                        step="0.01"
                        min="0.01"
                        name="amount"
                        value="{{ form_data.amount }}"
                        required
                    >
                </label>

                <div class="preset-actions">
                    <button type="button" class="button button-secondary preset-button" data-amount="10.00">+10</button>
                    <button type="button" class="button button-secondary preset-button" data-amount="25.00">+25</button>
                    <button type="button" class="button button-secondary preset-button" data-amount="50.00">+50</button>
                </div>

                <button type="submit" class="button button-primary button-full">
                    Пополнить
                </button>
            </form>
        </article>
    </div>
</section>

<script>
    document.querySelectorAll(".preset-button").forEach((button) => {
        button.addEventListener("click", () => {
            const amountInput = document.querySelector('input[name="amount"]');
            if (amountInput) {
                amountInput.value = button.dataset.amount || "";
            }
        });
    });
</script>
{% endblock %}
